
<body>
    

    <div id="martWrap">

            <div class="product-container">

                <!-- 탭 메뉴 -->

                    <img src="images/item3.jpg">
                </div>

                <!-- 포인트 영역 -->
                <div class="detail-section">
                    <h3>POINT</h3>
                    <img src="images/item1.jpg">
                </div>
            
            <!-- 추천 상품 -->
            <div id="recommend" class="detail-section">

                        <img src="images/item3.jpg">
