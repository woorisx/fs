<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SSG Style Shop</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 상단 바 -->
<div class="topbar">
  <span>고객센터</span>
  <span>로그인</span>
  <span>회원가입</span>
</div>

<!-- 헤더 -->
<header class="header">
  <div class="logo">SSG STYLE</div>
  <input class="search" placeholder="검색어를 입력하세요">
  <div class="icons">🛒 ❤️ 👤</div>
</header>

<!-- 네비 -->
<nav class="nav">
  <button class="menu-btn">☰ 전체카테고리</button>
  <a href="#">특가</a>
  <a href="#">베스트</a>
  <a href="#">신상품</a>
  <a href="#">이벤트</a>
</nav>

<!-- 메인 배너 -->
<section class="banner">
  <h1>오늘의 특가 최대 50%</h1>
</section>

<!-- 카테고리 -->
<section class="categories">
  <div>🥬 채소</div>
  <div>🍎 과일</div>
  <div>🥩 정육</div>
  <div>🐟 수산</div>
  <div>🥛 유제품</div>
</section>

<!-- 상품 -->
<section class="products">
  <h2>🔥 인기 상품</h2>
  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/150">
      <p>신선한 사과</p>
      <span class="price">₩9,900</span>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/150">
      <p>한우 등심</p>
      <span class="price">₩29,000</span>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/150">
      <p>연어 필렛</p>
      <span class="price">₩15,000</span>
    </div>

  </div>
</section>

<footer class="footer">
  ⓒ SSG STYLE
</footer>

</body>
</html>
