<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장바구니 - 1조마트</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cart.css">
    <script src="js/jquery-4.0.0.js" defer></script>
    <script src="js/cart.js" defer></script>
    <script src="js/script.js" defer></script>
    <script src="js/top.js" defer></script>
</head>

<body>
<div id="martWrap">

    <div id="header"></div>

    <!-- 장바구니 -->
    <main>
        <div class="cartWrap">
            <h2>🛒 장바구니</h2>

            <!-- 상품 리스트 -->
            <div class="cartList">

                <!-- 상품 1 -->
                <div class="cartItem">
                    <input type="checkbox" class="check">

                    <div class="cartImg">
                        <img src="images/item1.jpg">
                    </div>

                    <div class="cartInfo">
                        <p class="name">대파 大 10개 묶음</p>
                        <p class="price">5000원</p>

                        <div class="countBox">
                            <button class="minus">-</button>
                            <input type="text" value="1" class="count">
                            <button class="plus">+</button>
                        </div>
                    </div>

                    <div class="totalPrice">5000원</div>

                    <button class="delete">삭제</button>
                </div>

            </div>

            <!-- 결제 영역 -->
            <div class="cartSummary">
                <p>상품금액: <span id="totalItemPrice">0</span>원</p>
                <p>배송비: <span id="deliveryFee">0</span>원</p>
                <h3>총 결제금액: <span id="finalPrice">0</span>원</h3>

                <button class="orderBtn">주문하기</button>
            </div>
        </div>
    </main>

</div>
<div id="footer"></div>
