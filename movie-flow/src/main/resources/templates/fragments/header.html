<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <nav th:fragment="common-header" class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" th:href="@{/}">
                <i class="fa-solid fa-film text-danger me-2"></i>MOVIE FLOW
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <!-- activeBots 데이터가 없어도(null) 돌아가도록 기본값을 false로 잡았습니다 -->
                    <li class="nav-item me-4" th:with="isActive=${activeBots != null and activeBots > 0}">
                        <span class="small text-secondary">
                            <span id="rpaStatusDot" class="rpa-status-dot" th:classappend="${isActive} ? ' active' : ' inactive'"></span>
                            <span id="rpaStatusText" th:text="${isActive} ? 'RPA Engine Active' : 'RPA Engine Inactive'"></span>
                        </span>
                    </li>
                    <li class="nav-item me-3">
                        <a class="nav-link nav-link-custom" th:href="@{/admin}">
                            <i class="fa-solid fa-user-gear me-1"></i>관리자
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/mypage}" class="btn btn-outline-light btn-sm px-3">마이페이지</a>
                    </li>
                </ul>
            </div>
        </div>
        <script>
            (() => {
                const dot = document.getElementById('rpaStatusDot');
                const text = document.getElementById('rpaStatusText');

                function renderRpaStatus(active) {
                    if (!dot || !text) {
                        return;
                    }
                    if (active) {
                        dot.classList.add('active');
                        dot.classList.remove('inactive');
                    } else {
                        dot.classList.remove('active');
                        dot.classList.add('inactive');
                    }
                    text.textContent = active ? 'RPA Engine Active' : 'RPA Engine Inactive';
                }

                async function refreshRpaStatus() {
                    try {
                        const response = await fetch('/api/rpa/status', { cache: 'no-store' });
                        if (!response.ok) {
                            return;
                        }
                        const status = await response.json();
                        renderRpaStatus(Boolean(status.active));

                        const activeBotCount = document.getElementById('activeBotCount');
                        if (activeBotCount) {
                            activeBotCount.textContent = status.activeBots ?? 0;
                        }
                    } catch (error) {
                        // Keep the last visible state if the status request briefly fails.
                    }
                }

                refreshRpaStatus();
                window.setInterval(refreshRpaStatus, 3000);
            })();
        </script>
    </nav>
</body>
</html>
