name: 4시간 주기 데이터 전송 자동화

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Render 서버 주소를 상수로 관리
  RENDER_API_URL: "https://movie-flow.onrender.com/api/movies/update"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          # 현재 코드에 필요한 bs4와 .env 관리용 패키지 설치
          # urllib는 내장이라 설치 불필요
          pip install beautifulsoup4 python-dotenv

      - name: 크롤링 실행 및 데이터 전송
        run: |
          # 1. 스크립트 위치 자동 찾기
          SCRIPT_PATH=$(find . -name "theater_crawler.py" | head -n 1)
          
          if [ -z "$SCRIPT_PATH" ]; then
            echo "Error: theater_crawler.py를 찾을 수 없습니다."
            exit 1
          fi
          
          # 2. 파이썬 실행 결과(JSON)를 변수에 담기
          # (주의: 코드 내부의 다른 print문이 섞이지 않도록 스크립트는 최종 JSON만 출력해야 함)
          JSON_DATA=$(python "$SCRIPT_PATH")
          
          # 3. curl을 사용하여 Render 서버로 POST 전송
          curl -X POST "${{ env.RENDER_API_URL }}" \
               -H "Content-Type: application/json; charset=utf-8" \
               -d "$JSON_DATA"