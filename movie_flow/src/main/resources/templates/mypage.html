<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 알림 관리 - Movie Flow</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<div th:replace="~{fragments/header :: common-header}"></div>

<main class="container my-5">
    <h2 class="fw-bold mb-4">내 알림 관리</h2>
    <div class="card-custom overflow-hidden">
        <table class="table table-dark table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th class="bg-dark text-secondary">신청 영화</th>
                    <th class="bg-dark text-secondary">상영 정보</th>
                    <th class="bg-dark text-secondary">상태</th>
                    <th class="bg-dark text-secondary">관리</th>
                </tr>
            </thead>
            <tbody>
                <!-- 알림 목록이 없을 경우를 대비한 처리 -->
                <tr th:if="${#lists.isEmpty(alerts)}">
                    <td colspan="4" class="text-center py-4 text-secondary">등록된 알림이 없습니다.</td>
                </tr>
                
                <tr th:each="alert : ${alerts}">
                    <!-- JdbcTemplate Map 반환 시 컬럼명(snake_case)을 그대로 사용해야 합니다 -->
                    <td th:text="${alert.movie_title}">인사이드 아웃 2</td>
                    <td th:text="${alert.theater_name + ' | ' + (alert.start_time != null ? alert.start_time : '정보 없음')}">정보</td>
                    <td>
                        <span class="badge" 
                              th:classappend="${alert.status == 'WATCHING' ? 'bg-success' : 'bg-secondary'}"
                              th:text="${alert.status == 'WATCHING' ? '감시 중' : '전송 완료'}"></span>
                    </td>
                    <td>
                        <form th:action="@{/alert/cancel}" method="post" onsubmit="return confirm('알림을 취소하시겠습니까?');">
                            <!-- ID값 역시 DB 컬럼명인 id를 사용 -->
                            <input type="hidden" name="id" th:value="${alert.id}">
                            <button type="submit" class="btn btn-sm btn-outline-danger">알림 취소</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{fragments/footer :: common-footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
