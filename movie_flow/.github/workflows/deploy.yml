name: Deploy movie-flow to AWS EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/movie-flow:latest

      # 3. EC2 원격 접속 및 배포
      - name: SSH Remote Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # 기존 컨테이너 중지 및 삭제
            sudo docker stop movie-flow 2>/dev/null || true
            sudo docker rm movie-flow 2>/dev/null || true
            sudo docker image rm ${{ secrets.DOCKERHUB_USERNAME }}/movie-flow:latest 2>/dev/null || true
            
            # 새 이미지 가져오기
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/movie-flow:latest
            
            # 컨테이너 실행 (image_553286.png의 Secrets 명칭 적용)
            # TiDB URL의 특수문자 보호를 위해 큰따옴표("") 사용
            sudo docker run -d \
              --name movie-flow \
              --restart unless-stopped \
              -p 80:8080 \
              -e SPRING_DATASOURCE_URL="${{ secrets.DB_URL }}" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.DB_USER }}" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.DB_PASS }}" \
              -e SPRING_DATASOURCE_DRIVER_CLASS_NAME="com.mysql.cj.jdbc.Driver" \
              -e SPRING_MAIL_HOST="${{ secrets.MAIL_HOST }}" \
              -e SPRING_MAIL_PORT="${{ secrets.MAIL_PORT }}" \
              -e SPRING_MAIL_USERNAME="${{ secrets.MAIL_USER }}" \
              -e SPRING_MAIL_PASSWORD="${{ secrets.MAIL_PASS }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/movie-flow:latest
            
            # 불필요한 이미지 정리
            sudo docker image prune -f